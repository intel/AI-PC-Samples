[project]
name = "ai-upscaling-with-npu"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = "==3.11.*"
dependencies = [
    "huggingface-hub>=0.28.1",
    "ipykernel>=6.29.5",
    "ipywidgets>=8.1.5",
    "jupyter>=1.1.1",
    "safetensors>=0.5.2",
    "openvino>=2025.0.0",
    "opencv-python>=4.11.0.86",
    "nncf>=2.15.0",
    "torchinfo>=1.8.0",
    "plotly>=6.0.0",
    "ffmpeg-python>=0.2.0",
    "torch==2.13.0",
    "certifi>=2024.0.0",
    "h11==0.16.0",
    "jinja2==3.1.6",
    "jupyterlab==4.5.9",
    "notebook==7.5.6",
    "requests==2.33.0",
    "urllib3==2.7.0",
    "streamlit>=1.58.0",
    "tornado>=6.5.5",
    "mistune>=3.3.0",
    "pillow>=12.3.0",
    "nbconvert>=7.17.0",
    "setuptools>=78.1.1",
    "jupyter-server>=2.20.0",
    "idna>=3.15",
    "fonttools>=4.60.2",
    "filelock>=3.20.1",
    "pygments>=2.20.0",
    "soupsieve>=2.8.4",
